<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Pianissola</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f7f5;
      --ink: #181816;
      --muted: #999590;
      --line: #e8e4df;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Inter', sans-serif;
      font-weight: 300;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }

    /* HEADER */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      background: var(--bg);
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: 1.35rem;
      letter-spacing: 0.08em;
      color: var(--ink);
    }

    .logo i { font-style: italic; color: var(--muted); }

    .upload-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 7px 14px;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      font-weight: 400;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      -webkit-appearance: none;
    }

    #file-input { display: none; }

    /* MAIN */
    main {
      padding-top: 52px;
      padding-bottom: 48px;
      min-height: 100vh;
    }

    /* EMPTY STATE */
    #empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 100px);
      gap: 14px;
      padding: 2rem;
      text-align: center;
    }

    #empty .tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.9rem;
      color: var(--muted);
      line-height: 1.3;
    }

    #empty p {
      font-size: 0.75rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      line-height: 1.8;
    }

    #empty .start-btn {
      margin-top: 8px;
      background: var(--ink);
      color: var(--bg);
      border: none;
      padding: 12px 32px;
      font-family: 'Inter', sans-serif;
      font-size: 0.7rem;
      font-weight: 400;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      cursor: pointer;
    }

    /* GRID — 2 columns, equal gap */
    #grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      padding: 3px;
    }

    .photo-item {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--line);
    }

    /* Make images fill a square */
    .photo-item::before {
      content: '';
      display: block;
      padding-top: 100%;
    }

    .photo-item img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      filter: saturate(0.9) brightness(1.01);
      transition: transform 0.35s ease, opacity 0.25s;
    }

    .photo-item:active img {
      opacity: 0.8;
      transform: scale(1.03);
    }

    /* LIGHTBOX */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: var(--bg);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #lightbox.open { display: flex; }

    #lb-img {
      max-width: 100vw;
      max-height: calc(100vh - 100px);
      object-fit: contain;
      filter: saturate(0.9) brightness(1.01);
      display: block;
    }

    .lb-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      border-bottom: 1px solid var(--line);
    }

    .lb-close {
      background: none;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      cursor: pointer;
    }

    .lb-counter {
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      color: var(--muted);
    }

    /* Swipe arrows on lightbox */
    .lb-arrows {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 28px;
    }

    .lb-arrow {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--muted);
      cursor: pointer;
      padding: 8px;
      line-height: 1;
    }

    /* FOOTER */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: 48px;
      background: var(--bg);
      border-top: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
    }

    footer span {
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }
  </style>
</head>
<body>

<header>
  <div class="logo">Piano<i>ssola</i></div>
  <button class="upload-btn" onclick="document.getElementById('file-input').click()">
    + fotos
  </button>
  <input type="file" id="file-input" accept="image/*" multiple>
</header>

<main>
  <div id="empty">
    <div class="tagline">o seu olhar,<br>em cada frame</div>
    <p>Toque em "+ fotos" para começar<br>seu arquivo visual</p>
    <button class="start-btn" onclick="document.getElementById('file-input').click()">
      Começar
    </button>
  </div>
  <div id="grid" style="display:none"></div>
</main>

<div id="lightbox">
  <div class="lb-top">
    <button class="lb-close" onclick="closeLb()">← voltar</button>
    <span class="lb-counter" id="lb-counter"></span>
  </div>
  <img id="lb-img" src="" alt="">
  <div class="lb-arrows">
    <button class="lb-arrow" onclick="navLb(-1)">‹</button>
    <button class="lb-arrow" onclick="navLb(1)">›</button>
  </div>
</div>

<footer>
  <span>Pianissola</span>
  <span id="ft-count"></span>
</footer>

<script>
  const photos = [];
  let current = 0;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  const ftCount = document.getElementById('ft-count');
  const lightbox = document.getElementById('lightbox');
  const lbImg = document.getElementById('lb-img');
  const lbCounter = document.getElementById('lb-counter');

  document.getElementById('file-input').addEventListener('change', e => {
    [...e.target.files].filter(f => f.type.startsWith('image/')).forEach(addPhoto);
    e.target.value = '';
  });

  function addPhoto(file) {
    const reader = new FileReader();
    reader.onload = e => {
      const idx = photos.length;
      photos.push(e.target.result);
      renderItem(e.target.result, idx);
      updateUI();
    };
    reader.readAsDataURL(file);
  }

  function renderItem(src, idx) {
    const div = document.createElement('div');
    div.className = 'photo-item';
    const img = document.createElement('img');
    img.src = src;
    img.loading = 'lazy';
    img.alt = '';
    div.appendChild(img);
    div.addEventListener('click', () => openLb(idx));
    grid.appendChild(div);
  }

  function updateUI() {
    const n = photos.length;
    ftCount.textContent = n === 1 ? '1 foto' : `${n} fotos`;
    empty.style.display = n ? 'none' : 'flex';
    grid.style.display = n ? 'grid' : 'none';
  }

  function openLb(idx) {
    current = idx;
    showLb();
    lightbox.classList.add('open');
    document.body.style.overflow = 'hidden';
  }

  function showLb() {
    lbImg.src = photos[current];
    lbCounter.textContent = `${current + 1} / ${photos.length}`;
  }

  function closeLb() {
    lightbox.classList.remove('open');
    document.body.style.overflow = '';
  }

  function navLb(dir) {
    current = (current + dir + photos.length) % photos.length;
    showLb();
  }

  // Swipe gesture no lightbox
  let touchStartX = 0;
  lbImg.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; }, { passive: true });
  lbImg.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) navLb(dx < 0 ? 1 : -1);
  }, { passive: true });

  document.addEventListener('keydown', e => {
    if (!lightbox.classList.contains('open')) return;
    if (e.key === 'Escape') closeLb();
    if (e.key === 'ArrowRight') navLb(1);
    if (e.key === 'ArrowLeft') navLb(-1);
  });
</script>
</body>
</html>
